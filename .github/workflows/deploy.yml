name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      
      # Build Swift documentation using Makefile
      - name: Build Swift Documentation
        run: |
          cd sdk
          make docs-swift-export
      
      # Build TypeScript documentation using Makefile
      - name: Build TypeScript Documentation
        run: |
          cd sdk
          make docs-typescript-build
      
      # Copy docs to Docusaurus static folder
      - name: Copy API docs to static folder
        run: |
          mkdir -p static/swift static/typescript
          cp -r sdk/sdk-docs/swift/* static/swift/
          cp -r sdk/sdk-docs/typescript/* static/typescript/
      
      # Build Docusaurus site
      - name: Install Docusaurus dependencies
        run: npm ci
      
      - name: Build Docusaurus site
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        